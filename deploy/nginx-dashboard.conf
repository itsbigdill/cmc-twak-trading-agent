server {
    listen 8888;
    server_name cmc-twak-agent.duckdns.org;
    root /opt/cmc-twak-agent/dashboard;
    index index.html;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri $uri/ =404;
    }
}
