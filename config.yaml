# ============================================================================
#  BNB HACK Track 1 — Autonomous Trading Agent
#  ALL limits live here. Nothing risk-related is hardcoded (NFR 1.3).
#  Strategy is tuned for a RANK-BY-RETURN tournament with a hard drawdown DQ:
#  be aggressive while healthy, de-risk automatically near the DQ line.
# ============================================================================

mode: dry_run            # dry_run | live   (live actually signs txs via TWAK)

# --- Universe -------------------------------------------------------------
# Only the 149 eligible BEP-20 tokens count (off-list trades ignored).
# NOTE: `whitelist` (signal universe) is AUTO-DERIVED at load from
# regime.benchmark + twak.token_contracts + quote_asset, so the signal universe
# always equals the trade universe. The value below is just a placeholder.
whitelist: [BTC, USDT]
quote_asset: USDT        # cash leg
eligible_tokens_file: config/eligible_tokens.txt   # populate from the 149-list

# --- Loop -----------------------------------------------------------------
poll_interval_minutes: 1
rpc:
  max_retries: 5
  backoff_base_seconds: 2     # exponential: 2,4,8,16,32

# --- Risk gate (F4) — enforced on EVERY trade, logged on block ------------
risk:
  # Position sizing — tuned AGGRESSIVE for a rank-by-return contest with a ~30% DQ:
  # the optimal play is to use the drawdown budget, not hoard it. Concentrate in
  # the strongest names while healthy; tournament sizing de-risks near the kill line.
  max_position_pct: 0.55        # sniper catch-up: one high-conviction name, never all-in
  max_concentration_pct: 0.60   # allows the single 55% recovery shot, blocks all-in drift
  min_confidence: 0.56          # LLM confidence below this -> hold

  # Drawdown — layered defense (DQ is on peak-to-now max drawdown, ~30%).
  # 1) per-position stop: cut individual losers fast -> caps any one trade's
  #    contribution to drawdown. This is the primary DQ protector.
  # 2) daily pause: down >X% on the UTC day -> no NEW entries until next day
  #    (resets daily, so recovery is possible; we don't freeze the whole window).
  # 3) kill switch: peak-to-now drawdown hits the kill line -> close ALL + halt
  #    for the rest of the window. Final guard, set well under the DQ line.
  per_position_stop_pct: 0.06   # executable-value stop; avoids CMC/DEX mark illusions
                                # 4% (which whipsawed winners back to cash in chop), tighter
                                # than 10% (which bled too much in sustained downtrends).
  daily_loss_stop_pct: 0.10     # pause new entries for the rest of the UTC day
  drawdown_kill_pct: 0.20       # peak-to-now; close all + pause for the DAY (re-arms next
                                # UTC day, NOT a permanent halt). 10pt buffer under ~30% DQ.
  drawdown_dq_reference_pct: 0.30  # the judges' line, for logging headroom only
  leaderboard_entry_cutoff_pct: 0.275 # no new entries if judge DD leaves <2.5pt buffer
  leaderboard_dq_buffer_pct: 0.025    # size entries against the judge DQ line minus buffer

  # Activity corridor (per official FAQ): min 1 trade/day, 7 over the week.
  # Cap the top end to avoid simulated-tx-cost bleed.
  min_trades_per_day: 1
  min_trades_per_week: 7
  force_daily_trade: false      # disabled: never trade just to satisfy daily activity
  max_trades_per_day: 12        # NEW ENTRIES only; enough for rotations without churn
  min_seconds_between_trades: 900   # keep 15-minute entry pacing even with 1-minute ticks;
                                    # other anti-churn gates still apply
                                    # budget isn't burned in the first few hours. Closes are
                                    # EXEMPT (risk_gate lets exits through), so this only paces
                                    # new entries; rotation still exits freely. (Backtest forces
                                    # this to 0 — coarse bars can't represent intra-day pacing.)

  # "Keep capital deployed": any hour starting with a sub-$1 portfolio scores 0%.
  # Never let total portfolio value approach $1; keep a minimum in-scope holding.
  min_portfolio_usd: 5.0        # hard floor we defend well above the $1 cutoff

  # Execution safety
  max_slippage_pct: 0.01        # 1% slippage cap on swaps
  max_token_risk_score: 60      # TWAK token risk score (0=safe..100=risky); block above

  # Perps: NOT available via TWAK — the CLI is spot-swap only (verified v0.19.1).
  # So the agent is long/cash only: downtrends -> rotate to USDT, never short.
  # Edge now = regime-aware capital preservation + selection + not overtrading.
  perps_enabled: false

# --- Live execution hardening ---------------------------------------------
execution:
  max_price_impact_pct: 1.0       # independent of slippage; reject an already-bad quote
  max_round_trip_loss_pct: 3.0    # mandatory USDT->token->USDT recovery check
  min_swap_quote: 0.25            # do not waste gas on sub-$0.25 routes
  balance_buffer_fraction: 0.00001  # leave 0.001% dust; prevents balance races/round-up
  balance_reconcile_attempts: 5   # confirmed tx -> poll exact token/USDT deltas
  balance_reconcile_interval_seconds: 2
  min_gas_bnb: 0.003              # halt execution while exits cannot be funded safely
  retry_base_seconds: 60
  retry_max_seconds: 900

# --- Signal engine (F2) — deterministic, judge-reproducible ---------------
signal:
  # Component weights (sum ~1.0). Few magic constants on purpose (anti-overfit).
  weights:
    rsi: 0.25
    macd: 0.25
    ema: 0.30
    fear_greed: 0.10
    news: 0.10
    funding: 0.10        # CMC derivatives funding rate, contrarian (0 in price-only backtest)
    dominance: 0.05      # CMC BTC dominance regime tilt: BTC dominating -> risk-off for alts
    x402: 0.12           # paid x402 token-level boost; modest, never bypasses gates alone
    cmc: 0.12            # CMC Pro enrichment: quotes/volume/TA/holders/token news
  funding_scale: 0.01    # funding rate that maps to a full ±1 contribution (CMC returns
                         # ~0.002 typical, ~0.005+ crowded; 0.01 keeps it a bounded tilt)
  dominance_ref: 54.0    # neutral BTC dominance; above -> alts tilted down, below -> up
  dominance_scale: 12.0  # dominance points away from ref that map to a full ±1 tilt
  rsi_oversold: 30
  rsi_overbought: 70
  entry_threshold: 0.30         # LLM cannot bypass this deterministic gate
                                # but too low churns in chop). Raised 0.25 -> 0.30 to cut
                                # marginal-momentum entries that flip-flop at the boundary.
  chop_dampen: 0.30             # multiply score by this in chop regime
  history_period: week          # twak price history window for live TA (~3h bars)

# --- Regime detection -----------------------------------------------------
regime:
  benchmark: BTC                # drives global regime
  fear_extreme_low: 25
  fear_extreme_high: 75

# --- Decision policy (F3) -------------------------------------------------
decision:
  policy: rotation          # rotation | threshold
  strategy_label: Comeback v2
  rotation_top_k: 1         # one best executable candidate; avoid five mediocre wounds
  rotation_min_momentum: 0.30
  rotation_downtrend_topk: 1
                                   # name (NOT 100% cash: a cash week scores ~0% in a rank-by-
                                   # return contest). Backtest: this BEAT pure-cash in the bear
                                   # year (-9.7% vs -12.6%). Stops + daily pause + kill cap risk.
  rotation_downtrend_min_momentum: 0.28
  rotation_reentry_cooldown_hours: 4     # hysteresis: after rotating OUT of a name, wait this
                                         # many HOURS before rotating back IN. Time-based, so it is
                                         # consistent in live and backtest. Kills the buy->sell->buy
                                         # thrash on boundary names without holding a strong name out
                                         # for half a day (12h backtested slightly worse on the
                                         # short week sample; 4h is the gentler middle).
  rotation_score_hurdle: 0.18            # challenger must beat a held name after costs/risk
  entry_filter:
    enabled: true
    # Anti-late-chase gate. The raw score is laggy because EMA/MACD/CMC can
    # remain bullish after a move is already crowded. In downtrends, only enter
    # if the candidate is execution-validated AND still fresh: positive but not
    # vertical 6h momentum, not a hot 1h candle, not already too extended on CMC.
    min_quality_downtrend: 0.03
    min_quality_uptrend: 0.02
    min_return_6h_downtrend: 0.0
    max_return_6h_downtrend: 0.08
    max_cmc_pct_1h_downtrend: 0.03
    max_cmc_pct_24h_downtrend: 0.18
    max_cmc_pct_7d_downtrend: 0.45
    max_distance_from_48h_high_downtrend: -0.005
    min_volume_change_24h_downtrend: -0.25
    hot_volume_min_change_24h_downtrend: -0.10
  held_exit:
    enabled: true
    # Held-token health floor. A current position may stay below the new-entry
    # threshold, but not indefinitely: if its own score decays below this floor
    # the strategy exits to cash instead of "hoping". New entries still require
    # execution validation and the higher rotation threshold.
    floor_score_downtrend: 0.28
    floor_score_uptrend: 0.20
    min_quality_downtrend: 0.0
    min_return_6h_downtrend: -0.015
    stale_loss_pct: -0.006
    stale_loss_min_return_6h: -0.005
    micro_profit_take_pct: 0.015
    micro_profit_sell_fraction: 0.45
    min_micro_profit_sell_usd: 1.0
  target_gross_exposure_pct: 0.55        # maximum catch-up mode exposure outside the top five
  dynamic_sizing:
    enabled: true
    # Asset-agnostic comeback sizing. Lowering the downtrend gate is only safe if
    # borderline signals get smaller size; strong signals can still use the full
    # catch-up budget. All entries still require TWAK route validation + risk gate.
    low_score: 0.28
    mid_score: 0.32
    high_score: 0.38
    low_exposure_pct: 0.30
    mid_exposure_pct: 0.40
    high_exposure_pct: 0.55
    stress_drawdown_pct: 0.18
    stress_exposure_pct: 0.25
  top5_gross_exposure_pct: 0.05          # defend rank aggressively once inside top five
  top5_max_mark_divergence_pct: 10.0     # ignore an inflated board rank when it disagrees with exits
  min_rebalance_usd: 1.0
  signal_confirmation:
    base_score: 0.27
    immediate_score: 0.42                # very strong signals enter on one observation
    required_ticks: 2                    # 0.27-0.42 requires two consecutive observations

profit_lock:
  enabled: true
  activation_pct: 0.07                   # after +7%, never let a winner become a loser
  breakeven_floor_pct: 0.025             # preserve entry cost + expected route friction
  trailing_activation_pct: 0.14
  trailing_gap_pct: 0.055
  partial_take_pct: 0.12
  partial_sell_fraction: 0.35
  min_partial_sell_usd: 1.0

universe:
  enabled: true
  resolved_contracts_file: config/bsc_contracts.json
  cache_file: state/universe_cache.json
  refresh_hours: 4
  retain_last_good_hours: 12
  probe_usd: 4.0
  max_round_trip_loss_pct: 3.0
  min_history_bars: 35
  max_assets: 120
  workers: 12

leaderboard:
  url: https://bnbhackleaderboard.pages.dev/
  refresh_minutes: 30

llm:
  # Provider-agnostic (agent/llm.py): auto-picks by key — GEMINI_API_KEY -> Gemini
  # (free tier, default gemini-3.5-flash), else ANTHROPIC_API_KEY -> Claude, else
  # the deterministic RotationDecider runs alone. Override model via GEMINI_MODEL /
  # ANTHROPIC_MODEL env. No LLM requirement from the hackathon — this is optional polish.
  max_tokens: 1500
  second_gate: false            # deterministic validated strategy executes; LLM still enriches signals/news

# --- Integrations ---------------------------------------------------------
cmc:
  mcp_url: https://mcp.coinmarketcap.com/mcp
  enrichment_enabled: true
  cache_file: state/cmc_enrichment_cache.json
  max_id_resolves_per_tick: 30       # resolve likely candidates fast; cache persists
  enrich_top_n: 8                    # expensive TA/metrics/news only for finalists
  quotes_ttl_seconds: 900
  technicals_ttl_seconds: 3600
  metrics_ttl_seconds: 21600
  news_ttl_seconds: 7200
  min_volume_24h_usd: 500000
  # API key from env: CMC_MCP_API_KEY  (header X-CMC-MCP-API-KEY)
  # CMC tools need numeric ids (not symbols). Verified via scripts/verify_cmc.py.
  # Extend for the full 149-token universe (resolve ids with search_cryptos).
  token_ids:
    BTC: "1"
    ETH: "1027"
    BNB: "1839"
    CAKE: "7186"
    USDT: "825"

