# --- x402 (pay-per-request data in the trade loop; TWAK x402 + CDP facilitator) -
x402:
  signal_url: ""              # set to the https x402 endpoint to enable in-loop payments
  max_payment_atomic: 1000    # 0.001 USDC cap per request (6dp)
  every_n_ticks: 60           # 1-minute loop: keep paid premium signal roughly hourly

bnb_sdk:
  agent_name: cmc-twak-trading-agent
  enabled: true
  agent_id: "138200"            # ERC-8004 identity minted on BSC mainnet (special prize)
